<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple To-Do</title>
  <link rel="stylesheet" href="todolist.css">
</head>
<body>

<div class="todo-box">
  <h1>To-Do List</h1>

  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Enter a task">
    <button id="addBtn">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script src="todolist.js"></script>
</body>
</html>
